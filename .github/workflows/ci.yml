name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate platform files
        run: |
          flutter create --project-name uv_player .
          rm -f test/widget_test.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

  build-android:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate platform files
        run: |
          flutter create --project-name uv_player .
          rm -f test/widget_test.dart

      - name: Fix Android SDK version
        run: |
          sed -i 's/compileSdk .*/compileSdk 36/' android/app/build.gradle
          sed -i 's/targetSdk .*/targetSdk 35/' android/app/build.gradle
          sed -i 's/minSdk .*/minSdk 21/' android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uv-player-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  tag-release:
    needs: [build-android]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        run: |
          VERSION=$(date +%Y.%m.%d)-${GITHUB_SHA::7}
          git tag -a "v$VERSION" -m "Release $VERSION"
          git push origin "v$VERSION"
